<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P TRADING | Secure</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --bg: #0b0e11; --card: #1e2329; --gold: #f3ba2f; --green: #0ecb81; --text: #eaecef; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #login-screen { background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid var(--gold); text-align: center; width: 320px; }
        #chat-screen { display: none; width: 100%; height: 100vh; flex-direction: column; max-width: 600px; background: #161a1e; border-left: 1px solid #474d57; border-right: 1px solid #474d57; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #474d57; background: #2b3139; color: white; }
        .btn { background: var(--gold); color: black; border: none; padding: 12px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg-box { background: var(--card); padding: 10px; border-radius: 8px; max-width: 80%; align-self: flex-start; border-left: 3px solid var(--green); }
        .msg-user { color: var(--gold); font-size: 12px; font-weight: bold; margin-bottom: 4px; }
        .input-area { background: var(--card); padding: 15px; display: flex; gap: 10px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2 style="color:var(--gold)">P2P TRADING</h2>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn" onclick="handleLogin()">LOGIN</button>
    </div>

    <div id="chat-screen">
        <header style="padding:15px; text-align:center; border-bottom:1px solid #474d57; color:var(--gold); font-weight:bold;">SECURE TERMINAL</header>
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="m" placeholder="Message..." autocomplete="off">
            <button class="btn" style="width:80px" onclick="sendMessage()">SEND</button>
        </div>
    </div>

    <script>
        const socket = io();
        let currentAuthUser = "";
        const allowedUsers = { "P2P TRADER KING👑": "63743", "CUSTOMER NO 447": "CN 447" };

        function handleLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(allowedUsers[u] === p) {
                currentAuthUser = u;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
            } else { alert("Invalid!"); }
        }

        function sendMessage() {
            const val = document.getElementById('m').value;
            if(val) {
                socket.emit('chat message', { user: currentAuthUser, type: 'text', content: val });
                document.getElementById('m').value = '';
            }
        }

        socket.on('chat message', (data) => {
            const div = document.createElement('div');
            div.className = 'msg-box';
            if(data.isAutoReply) div.style.borderLeft = "3px solid var(--gold)";
            div.innerHTML = `<div class="msg-user">${data.user}</div><div>${data.content}</div>`;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        });
    </script>
</body>
</html>
