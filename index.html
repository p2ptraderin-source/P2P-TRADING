<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P TRADING | Secure Terminal</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --bg: #0b0e11; --card: #1e2329; --gold: #f3ba2f; --green: #0ecb81; --text: #eaecef; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* Login Screen */
        #login-screen { background: var(--card); padding: 35px; border-radius: 15px; border: 1px solid var(--gold); text-align: center; width: 330px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #login-screen h2 { color: var(--gold); margin-bottom: 20px; letter-spacing: 1px; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #474d57; background: #2b3139; color: white; font-size: 15px; }
        .btn { background: var(--gold); color: black; border: none; padding: 12px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn:hover { background: #e2ae26; }

        /* Chat Screen */
        #chat-screen { display: none; width: 100%; height: 100vh; flex-direction: column; max-width: 600px; background: #161a1e; border-left: 1px solid #474d57; border-right: 1px solid #474d57; }
        header { background: var(--card); padding: 15px; text-align: center; border-bottom: 1px solid #474d57; color: var(--gold); font-weight: bold; font-size: 18px; }
        
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: var(--bg); }
        .msg-box { background: var(--card); padding: 12px; border-radius: 10px; max-width: 85%; align-self: flex-start; border-left: 4px solid var(--green); word-wrap: break-word; }
        .msg-user { color: var(--gold); font-size: 12px; font-weight: bold; margin-bottom: 5px; }
        .msg-box img { max-width: 100%; border-radius: 8px; margin-top: 8px; border: 1px solid #474d57; }

        /* Input Area */
        .input-area { background: var(--card); padding: 15px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #474d57; }
        #m { flex: 1; background: #2b3139; border: 1px solid #474d57; padding: 12px; border-radius: 5px; color: white; outline: none; }
        .icon-btn { background: #474d57; color: white; padding: 10px; border-radius: 5px; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>P2P TRADING</h2>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn" onclick="handleLogin()">ACCESS TERMINAL</button>
    </div>

    <div id="chat-screen">
        <header>SECURE P2P TERMINAL</header>
        <div id="messages"></div>
        <div class="input-area">
            <input type="file" id="fileInp" accept="image/*" style="display:none">
            <div class="icon-btn" onclick="document.getElementById('fileInp').click()">📷</div>
            
            <input type="text" id="m" placeholder="Type message..." autocomplete="off">
            <button class="btn" style="width: 80px;" onclick="sendMessage()">SEND</button>
        </div>
    </div>

    <script>
        const socket = io();
        let currentAuthUser = "";
        const allowedUsers = { 
            "P2P TRADER KING👑": "63743", 
            "CUSTOMER NO 447": "CN 447" 
        };

        function handleLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(allowedUsers[u] === p) {
                currentAuthUser = u;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
            } else { 
                alert("Invalid Username or Password!"); 
            }
        }

        function sendMessage() {
            const val = document.getElementById('m').value;
            if(val) {
                socket.emit('chat message', { user: currentAuthUser, type: 'text', content: val });
                document.getElementById('m').value = '';
            }
        }

        // Photo Upload Handling
        document.getElementById('fileInp').onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    socket.emit('chat message', { user: currentAuthUser, type: 'img', content: ev.target.result });
                };
                reader.readAsDataURL(file);
            }
        };

        socket.on('chat message', (data) => {
            const div = document.createElement('div');
            div.className = 'msg-box';
            if(data.isAutoReply) div.style.borderLeft = "4px solid #f3ba2f";

            let contentHTML = data.type === 'text' 
                ? `<div>${data.content}</div>` 
                : `<img src="${data.content}">`;

            div.innerHTML = `<div class="msg-user">${data.user}</div>${contentHTML}`;
            
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        });

        document.getElementById('m').addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
