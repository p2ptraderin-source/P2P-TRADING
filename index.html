<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P2P TRADING</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --bg: #0b0e11; --card: #1e2329; --gold: #f3ba2f; --text: #eaecef; }
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: sans-serif; overflow: hidden; }
        
        /* Login screen middle lo undadaniki */
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; }
        .login-box { background: var(--card); padding: 30px; border-radius: 10px; border: 1px solid var(--gold); width: 100%; max-width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #474d57; background: #2b3139; color: white; font-size: 16px; }
        .btn { background: var(--gold); color: black; border: none; padding: 12px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; }

        /* Chat Screen Layout */
        #chat-screen { display: none; flex-direction: column; height: 100vh; width: 100%; }
        header { background: var(--card); padding: 15px; text-align: center; font-weight: bold; color: var(--gold); border-bottom: 1px solid #474d57; }
        
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: var(--bg); }
        .msg-box { background: var(--card); padding: 10px; border-radius: 8px; max-width: 85%; align-self: flex-start; border-left: 3px solid #0ecb81; line-height: 1.4; }
        .msg-user { color: var(--gold); font-size: 11px; font-weight: bold; margin-bottom: 3px; }
        img { max-width: 100%; border-radius: 5px; margin-top: 5px; }

        /* Input Area Mobile Fix */
        .input-area { background: var(--card); padding: 10px; display: flex; gap: 8px; border-top: 1px solid #474d57; align-items: center; }
        #m { flex: 1; background: #2b3139; border: 1px solid #474d57; padding: 12px; border-radius: 5px; color: white; outline: none; min-width: 0; }
        .icon-btn { background: #474d57; color: white; padding: 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color:var(--gold); margin-top:0;">P2P LOGIN</h2>
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn" onclick="handleLogin()">ACCESS TERMINAL</button>
        </div>
    </div>

    <div id="chat-screen">
        <header>SECURE P2P TERMINAL</header>
        <div id="messages"></div>
        <div class="input-area">
            <input type="file" id="fileInp" accept="image/*" style="display:none">
            <div class="icon-btn" onclick="document.getElementById('fileInp').click()">📷</div>
            <input type="text" id="m" placeholder="Message..." autocomplete="off">
            <button class="btn" style="width:70px;" onclick="sendMessage()">SEND</button>
        </div>
    </div>

    <script>
        const socket = io();
        let currentAuthUser = "";
        const allowedUsers = { "P2P TRADER KING👑": "63743", "CUSTOMER NO 447": "CN 447" };

        function handleLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(allowedUsers[u] === p) {
                currentAuthUser = u;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
                setTimeout(() => { window.scrollTo(0, 0); }, 100);
            } else { alert("Error: Wrong Details!"); }
        }

        function sendMessage() {
            const val = document.getElementById('m').value;
            if(val) {
                socket.emit('chat message', { user: currentAuthUser, type: 'text', content: val });
                document.getElementById('m').value = '';
            }
        }

        document.getElementById('fileInp').onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    socket.emit('chat message', { user: currentAuthUser, type: 'img', content: ev.target.result });
                };
                reader.readAsDataURL(file);
            }
        };

        socket.on('chat message', (data) => {
            const div = document.createElement('div');
            div.className = 'msg-box';
            if(data.isAutoReply) div.style.borderColor = "var(--gold)";
            let msgContent = data.type === 'text' ? `<div>${data.content}</div>` : `<img src="${data.content}">`;
            div.innerHTML = `<div class="msg-user">${data.user}</div>${msgContent}`;
            document.getElementById('messages').appendChild(div);
            const msgDiv = document.getElementById('messages');
            msgDiv.scrollTop = msgDiv.scrollHeight;
        });

        document.getElementById('m').addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });
    </script>
</body>
</html>
